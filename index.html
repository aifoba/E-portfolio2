<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivo Awasung</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/56d8b67a5e.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="about-me">
        <nav>

            <div class="personal__logo">Ivo Awasung</div>
            <ul class="nav__link--list">
                <li>
                    <a href="" class="
                    nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black
                    ">Languages
                    </a>
                </li>
                <li>
                    <a href="" class="
                    nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black
                    ">Projects
                    </a>
                </li>
                <li>
                    <a href="" class="
                    nav__link--anchor
                    nav__link--anchor--primary
                    
                    ">Contact
                    </a>
                </li>
            </ul>
        </nav>

        <div class="flex flex-1">
            <div class="about-me__info row">
                <div class="about-me__info--container">
                    <figure class="about-me__picture--mask">
                        <img src="./assets/ivo_pic.jpeg" class="about-me__picture" alt="profile picture">

                    </figure>
                    <h1 class="about-me__info--title">
                        Hey! I am <span class="text--purple">Ivo Awasung</span> 👋
                    </h1>
                    <p class="about-me__info--para">
                        I am a <strong class="text--purple">Frontend Developer</strong> with experience in building responsive and user-friendly web applications.
                    </p>

                    <div class="about-me__links">
                        <a href="" class="about-me__link">
                            <i class="fa-brands fa-square-linkedin"></i>
                        </a>
                        
                        <a href="" class="about-me__link">
                            <i class="fa-brands fa-square-github"></i>
                        </a>
                        
                        <a href="" class="about-me__link">
                            <i class="fa-sharp fa-regular fa-envelopes-bulk"></i>
                        </a>
                        
                        <a href="" class="about-me__link">
                            <i class="fa-solid fa-file-pdf"></i>
                        </a>
                        
                    </div>

                    <figure class="about-me__img--container">
                    <img src="./assets/undraw_ai-research-assistant_cxx0.svg" class="about-me__img" alt="AI Research Assistant">

                    </figure>

                </div>

                
            </div>
        </div>
    </section>
</body>
</html>
